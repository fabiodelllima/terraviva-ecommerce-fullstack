# Dependabot configuration
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Frontend (Vite + Vue) - npm
  - package-ecosystem: "npm"
    directory: "/terraviva/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
    groups:
      frontend-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Backend (Django) - pip via requirements
  - package-ecosystem: "pip"
    directory: "/terraviva/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
    groups:
      backend-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Bloqueado por pyiceberg (dep transitiva de supabase-storage3) que requer cachetools<7
      # Reavaliar quando supabase-py remover dep de pyiceberg
      - dependency-name: "cachetools"
        versions: [">=7.0.0"]
      # Bloqueado por pyiceberg (dep transitiva de supabase-storage3) que requer rich<15
      - dependency-name: "rich"
        versions: [">=15.0.0"]

  # Docker base images
  - package-ecosystem: "docker"
    directories:
      - "/terraviva/frontend"
      - "/terraviva/backend"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
