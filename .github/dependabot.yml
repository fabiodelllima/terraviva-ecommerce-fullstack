# Dependabot configuration
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Frontend (Vite + React) - npm
  - package-ecosystem: "npm"
    directory: "/terraviva/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    groups:
      frontend-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Backend (Django) - pip via pyproject.toml
  - package-ecosystem: "pip"
    directory: "/terraviva/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      backend-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Docker base images (frontend and backend)
  - package-ecosystem: "docker"
    directories:
      - "/terraviva/frontend"
      - "/terraviva/backend"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(docker)"
      include: "scope"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
